<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Her Song 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #ff9bb3, #ffdce8);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* TOP SECTION */
.header {
    padding: 20px;
    text-align: center;
}

.header h2 {
    font-weight: 500;
    opacity: 0.9;
}

/* GRID PHOTOS */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 20px;
}

.grid img {
    width: 100%;
    border-radius: 15px;
    object-fit: cover;
    height: 150px;
}

/* SONG INFO */
.song-info {
    padding: 20px;
}

.song-info h1 {
    font-size: 1.3rem;
}

.song-info p {
    opacity: 0.8;
    font-size: 0.9rem;
}

/* PLAYER */
.player {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 20px;
    margin: 15px;
}

.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
}

.play {
    background: #ff4d88;
    border: none;
    padding: 12px 18px;
    border-radius: 50%;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 77, 136, 0.6);
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 5px;
    margin-top: 10px;
}

.bar {
    width: 30%;
    height: 100%;
    background: white;
    border-radius: 5px;
}

/* NEXT BUTTON */
.next-btn {
    text-align: center;
    margin-bottom: 15px;
}

.next-btn button {
    background: #ff4d88;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="header">
    <h2>Now Playing 💖</h2>
</div>

<!-- PHOTOS -->
<div class="grid">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
</div>

<!-- SONG INFO -->
<div class="song-info">
    <h1>KINNA SONA</h1>
    <p>DRASHTI'S Favourite song</p>
</div>

<!-- PLAYER -->
<div class="player">
    <div class="progress">
        <div class="bar"></div>
    </div>

    <div class="controls">
        <span>⏮</span>
        <button class="play" onclick="toggleMusic()">▶</button>
        <span>⏭</span>
    </div>
</div>

<!-- NEXT -->
<div class="next-btn">
    <button onclick="nextPage()">Continue 💌</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="song.m4a" type="audio/mpeg">
</audio>
<script>
let playing = false;
const music = document.getElementById("music");

function toggleMusic() {
    if (!playing) {
        music.play();
        playing = true;
        localStorage.setItem("musicPlaying", "true");
        document.querySelector(".play").innerText = "⏸";
    } else {
        music.pause();
        playing = false;
        localStorage.setItem("musicPlaying", "false");
        document.querySelector(".play").innerText = "▶";
    }
}

function nextPage() {
  window.location.href = "birthdaypage.html";
}
</script>

</body>
</html>
